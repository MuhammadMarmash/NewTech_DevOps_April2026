name: lab3 tests - Parallel Mine

on:
  push:
    branches: [main]
    paths:
      - "GH_Actions/lab3/**"

jobs:
  test-validator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        working-directory: ./GH_Actions/lab3
      - name: Run validator tests
        run: |
          pytest --cov=GH_Actions/lab3/test_validator --cov-report=term-missing
        working-directory: ./GH_Actions/lab3

  test-transformer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        working-directory: ./GH_Actions/lab3

      - name: Run transformer tests
        run: |
          pytest --cov=GH_Actions/lab3/test_transformer --cov-report=term-missing
        working-directory: ./GH_Actions/lab3

  test-reporter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        working-directory: ./GH_Actions/lab3
      - name: Run reporter tests
        run: |
          pytest --cov=GH_Actions/lab3/test_reporter --cov-report=term-missing
        working-directory: ./GH_Actions/lab3

  pipeline-summary:
    runs-on: ubuntu-latest
    needs: [test-validator, test-transformer, test-reporter]
    if: always() # Run this job even if the previous jobs fail
    steps:
      - name: Pipeline summary
        run: |
          echo "Pipeline Summary:"
          echo "Validator Tests: ${{ needs.test-validator.result }}"
          echo "Transformer Tests: ${{ needs.test-transformer.result }}"
          echo "Reporter Tests: ${{ needs.test-reporter.result }}"
