name: lab3 tests - Parallel Mine

on:
  push:
    branches: [main]
    # paths:
    #   - "GH_Actions/lab3/**"

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        test-type: [validator, transformer, reporter]
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        working-directory: ./GH_Actions/lab3
      - name: Run ${{ matrix.test-type }} test
        run: |
          pytest --cov=GH_Actions/lab3/test_${{ matrix.test-type }} --cov-report=term-missing --cov-report=xml
        working-directory: ./GH_Actions/lab3
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.test-type }}-${{ matrix.os }}
          path: ./GH_Actions/lab3/coverage.xml

  security-scan:
    runs-on: ubuntu-latest
    needs: [tests]
    if: always() # Run this job even if the previous jobs fail
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install security dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
        working-directory: ./GH_Actions/lab3
      - name: Run Bandit security scan
        run: |
          bandit -r ./GH_Actions/lab3 --format xml -o bandit_report.xml
        working-directory: ./GH_Actions/lab3
      - name: Run Safety security scan
        run: |
          safety check --full-report --json > safety_report.json
        working-directory: ./GH_Actions/lab3
      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-reports-${{ matrix.os }}

  pipeline-summary:
    runs-on: ubuntu-latest
    needs: [tests, security-scan]
    if: always() # Run this job even if the previous jobs fail
    steps:
      - name: Pipeline summary
        run: |
          echo "Pipeline Summary:"
          echo "Tests: ${{ needs.tests.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
