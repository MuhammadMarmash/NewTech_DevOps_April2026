# This workflow runs Python tests automatically
# It triggers when you push code to GitHub

name: Python Tests - Lab 1

# When to run this workflow
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1: Run our tests
  test:
    runs-on: ubuntu-latest # Use Ubuntu Linux
    strategy:
      matrix:
        python-version: [3.11, 3.10, 3.9] # Test on Python 3.11
        directory: ["./GH_Actions/lab1", "./GH_Actions/lab2"] # Specify the directory for tests

    steps:
      # Step 1: Get the code from the repository
      - name: Checkout code
        uses: actions/checkout@v6

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # Step 3: Install any dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        working-directory: ${{ matrix.directory }}

      # Step 4: Run the tests
      - name: Run lab1 tests
        run: |
          python -m unittest test_calculator.py -v
        working-directory: "./GH_Actions/lab1"

      - name: Run lab2 tests
        run: |
          python -m unittest test_string_utils.py -v
        working-directory: "./GH_Actions/lab2"
