# This workflow runs Python tests automatically
# It triggers when you push code to GitHub

name: Python Tests - Lab 1 and 2

# When to run this workflow
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1: Run our tests
  test:
    runs-on: ubuntu-latest # Use Ubuntu Linux
    strategy:
      matrix:
        python-version: ["3.11", "3.10", "3.9"] # Test on Python 3.11
        lab:
          - { path: "./GH_Actions/lab1", file: "test_calculator.py" }
          - { path: "./GH_Actions/lab2", file: "test_string_utils.py" }

    steps:
      # Step 1: Get the code from the repository
      - name: Checkout code
        uses: actions/checkout@v6

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff

      # Step 3: Install any dependencies
      - name: Install requirements if they exist
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        working-directory: ${{ matrix.lab.path }}

      # Step 4: Run the tests
      - name: Run lab tests
        run: |
          python -m unittest ${{ matrix.lab.file }} -v
        working-directory: ${{ matrix.lab.path }}

      - name: test coverage
        run: |
          pytest --cov=${{ matrix.lab.path }} --cov-report=xml
        working-directory: ${{ matrix.lab.path }}

      - name: linting
        run: |
          ruff check --fix .
        working-directory: ${{ matrix.lab.path }}
