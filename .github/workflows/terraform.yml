name: lab4 terraform ci pipeline

on:
  push:
    branches: [main]
    paths:
      - "GH_Actions/lab4/**"
  pull_request:
    branches: [main]
    paths:
      - "GH_Actions/lab4/**"

jobs:
  terraform_setup:
    name: Terraform Setup
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_bucket_name: ${{ secrets.TF_BUCKET_NAME }}
      TF_VAR_aws_region: "eu-north-1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.5

      - name: Terraform Init
        run: terraform init --backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
        working-directory: ./GH_Actions/lab4/terraform
      - name: Terraform Format Check
        run: |
          if ! terraform fmt -check; then
            echo "Terraform files are not properly formatted. Please run 'terraform fmt' to format them."
            exit 1
          fi
        working-directory: ./GH_Actions/lab4/terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./GH_Actions/lab4/terraform

      - name: install checkov
        run: pip install checkov

      - name: checkov scan
        run: checkov -d . --framework terraform
        working-directory: ./GH_Actions/lab4/terraform

      - name: plan and save output
        run: terraform plan -out=tfplan
        working-directory: ./GH_Actions/lab4/terraform

      - name: terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
        working-directory: ./GH_Actions/lab4/terraform

      - name: terraform output
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform output -json > terraform_output.json
        working-directory: ./GH_Actions/lab4/terraform
